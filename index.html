<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabela de Distribuição</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #111; min-height: 100vh; }
    body { font-family: 'DM Sans', 'Segoe UI', sans-serif; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 1px 5px rgba(0,0,0,0.6);
      transition: box-shadow 0.15s, transform 0.12s;
    }
    input[type=range]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 6px rgba(255,255,255,0.1);
      transform: scale(1.15);
    }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px;
      border: none; border-radius: 50%;
      background: #fff; cursor: pointer;
    }

    .calc-btn {
      border: none; border-radius: 12px;
      font-size: 20px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; padding: 18px 0;
      transition: background 0.12s, transform 0.08s;
      user-select: none;
    }
    .calc-btn:active { transform: scale(0.92); }

    .tab-btn {
      flex: 1; padding: 11px 0;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }

    .ganho-input {
      background: #111;
      border: 2px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      padding: 8px 12px;
      width: 120px;
      outline: none;
      text-align: right;
      transition: border-color 0.2s;
    }
    .ganho-input:focus { border-color: #555; }

    .row-card {
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;

    const CATEGORIES = [
      { id: "gas",     label: "Gasolina",              sublabel: "combustível diário",             color: "#4a90d9", defaultPct: 22 },
      { id: "seguro",  label: "Seguro",                sublabel: "R$ 1.928/mês · provisão diária", color: "#9b59b6", defaultPct: 15 },
      { id: "parcela", label: "Parcela do carro",       sublabel: "R$ 1.545/mês · provisão diária", color: "#c97c3a", defaultPct: 12 },
      { id: "mae",     label: "Pagamento Mãe",          sublabel: "abater a dívida",                color: "#e05a5a", defaultPct: 12 },
      { id: "ipva",    label: "IPVA + Licenciamento",   sublabel: "reserva anual",                  color: "#d4a017", defaultPct: 4  },
      { id: "manut",   label: "Manutenção",             sublabel: "pneus, óleo, freios · reserva",  color: "#5ba85b", defaultPct: 7  },
      { id: "emerg",   label: "Reserva de Emergência",  sublabel: "fundo de segurança",             color: "#3ab8b8", defaultPct: 8  },
      { id: "lucro",   label: "Lucro / Pró-labore",     sublabel: "seu salário livre",              color: "#a8d45b", defaultPct: 20 },
    ];

    function fmt(n) {
      return n.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // ─── CALCULADORA ─────────────────────────────────────────────
    function Calculadora() {
      const [display, setDisplay] = useState("0");
      const [prev, setPrev]       = useState(null);
      const [op, setOp]           = useState(null);
      const [fresh, setFresh]     = useState(false);
      const [history, setHistory] = useState([]);

      const pressDigit = (d) => {
        if (fresh) { setDisplay(d === "." ? "0." : d); setFresh(false); return; }
        if (d === "." && display.includes(".")) return;
        setDisplay(display === "0" && d !== "." ? d : display + d);
      };

      const doCalc = (a, b, o) => {
        if (o === "+") return a + b;
        if (o === "-") return a - b;
        if (o === "×") return a * b;
        if (o === "÷") return b !== 0 ? a / b : 0;
        return b;
      };

      const pressOp = (o) => {
        const cur = parseFloat(display) || 0;
        if (prev !== null && !fresh) {
          const res = doCalc(prev, cur, op);
          setDisplay(fmt(res));
          setPrev(res);
        } else {
          setPrev(cur);
        }
        setOp(o);
        setFresh(true);
      };

      const pressEqual = () => {
        if (prev === null || op === null) return;
        const cur = parseFloat(display) || 0;
        const res = doCalc(prev, cur, op);
        const line = `${fmt(prev)} ${op} ${fmt(cur)} = ${fmt(res)}`;
        setHistory(h => [line, ...h].slice(0, 6));
        setDisplay(fmt(res));
        setPrev(null); setOp(null); setFresh(true);
      };

      const pressClear = () => { setDisplay("0"); setPrev(null); setOp(null); setFresh(false); };
      const pressPct   = () => { setDisplay(fmt(parseFloat(display) / 100)); setFresh(true); };
      const pressPM    = () => { setDisplay(fmt(parseFloat(display) * -1)); };
      const pressDel   = () => {
        if (display.length <= 1) { setDisplay("0"); return; }
        setDisplay(display.slice(0, -1));
      };

      const Btn = ({ label, onPress, type = "num", wide = false }) => {
        const bg  = type === "op" ? "#222233" : type === "eq" ? "#4a90d9" : type === "fn" ? "#252525" : "#1e1e1e";
        const col = type === "op" ? "#7a9fea" : type === "eq" ? "#fff"    : type === "fn" ? "#999"    : "#fff";
        const active = op === label && type === "op";
        return (
          <button
            className="calc-btn"
            onClick={onPress}
            style={{
              gridColumn: wide ? "span 2" : "span 1",
              background: active ? "#4a90d9" : bg,
              color: active ? "#fff" : col,
            }}
          >{label}</button>
        );
      };

      return (
        <div style={{ width: "100%", maxWidth: 340, margin: "0 auto" }}>
          {history.length > 0 && (
            <div style={{ background: "#181818", borderRadius: 12, padding: "10px 14px", marginBottom: 8 }}>
              {history.map((h, i) => (
                <div key={i} style={{ color: i === 0 ? "#777" : "#3a3a3a", fontSize: 11, fontFamily: "monospace", marginBottom: 2 }}>{h}</div>
              ))}
            </div>
          )}

          <div style={{ background: "#1c1c1c", borderRadius: 14, padding: "20px 22px 16px", marginBottom: 10, textAlign: "right" }}>
            {op && prev !== null && (
              <div style={{ color: "#444", fontSize: 13, marginBottom: 4 }}>{fmt(prev)} {op}</div>
            )}
            <div style={{
              color: "#fff", fontWeight: 700, letterSpacing: "-0.02em", wordBreak: "break-all",
              fontSize: display.length > 14 ? 20 : display.length > 9 ? 26 : 38,
            }}>{display}</div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
            <Btn label="C"   onPress={pressClear}          type="fn" />
            <Btn label="+/-" onPress={pressPM}             type="fn" />
            <Btn label="%"   onPress={pressPct}            type="fn" />
            <Btn label="÷"   onPress={() => pressOp("÷")} type="op" />
            <Btn label="7"   onPress={() => pressDigit("7")} />
            <Btn label="8"   onPress={() => pressDigit("8")} />
            <Btn label="9"   onPress={() => pressDigit("9")} />
            <Btn label="×"   onPress={() => pressOp("×")} type="op" />
            <Btn label="4"   onPress={() => pressDigit("4")} />
            <Btn label="5"   onPress={() => pressDigit("5")} />
            <Btn label="6"   onPress={() => pressDigit("6")} />
            <Btn label="-"   onPress={() => pressOp("-")} type="op" />
            <Btn label="1"   onPress={() => pressDigit("1")} />
            <Btn label="2"   onPress={() => pressDigit("2")} />
            <Btn label="3"   onPress={() => pressDigit("3")} />
            <Btn label="+"   onPress={() => pressOp("+")} type="op" />
            <Btn label="⌫"   onPress={pressDel}            type="fn" />
            <Btn label="0"   onPress={() => pressDigit("0")} />
            <Btn label=","   onPress={() => pressDigit(".")} />
            <Btn label="="   onPress={pressEqual}          type="eq" />
          </div>
        </div>
      );
    }

    // ─── TABELA ───────────────────────────────────────────────────
    function Tabela() {
      const [ganhoInput, setGanhoInput] = useState("200");
      const [pcts, setPcts] = useState(
        Object.fromEntries(CATEGORIES.map(c => [c.id, c.defaultPct]))
      );

      const ganho    = parseFloat(ganhoInput) || 0;
      const totalPct = Object.values(pcts).reduce((a, b) => a + b, 0);
      const diff     = Math.abs(100 - totalPct);
      const over     = totalPct > 100;

      const handleSlider = useCallback((id, val) => {
        setPcts(prev => ({ ...prev, [id]: Number(val) }));
      }, []);

      return (
        <div style={{ width: "100%", maxWidth: 520 }}>
          {/* Summary pills */}
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            {[
              { label: "Categorias",   value: `${CATEGORIES.length}` },
              { label: "Comprometido", value: `${totalPct}%` },
              { label: "Referência",   value: `R$ ${ganhoInput || 0}` },
            ].map(s => (
              <div key={s.label} style={{ flex: 1, background: "#1c1c1c", borderRadius: 12, padding: "12px 14px" }}>
                <div style={{ color: "#555", fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 4 }}>{s.label}</div>
                <div style={{ color: "#fff", fontSize: 18, fontWeight: 700 }}>{s.value}</div>
              </div>
            ))}
          </div>

          {/* Ganho input */}
          <div style={{ background: "#1c1c1c", borderRadius: 14, padding: "14px 18px", marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ color: "#fff", fontWeight: 600, fontSize: 14 }}>Quanto você ganhou hoje?</div>
              <div style={{ color: "#555", fontSize: 12 }}>Valor bruto do dia</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ color: "#555", fontSize: 14, fontWeight: 600 }}>R$</span>
              <input
                className="ganho-input"
                value={ganhoInput}
                onChange={e => setGanhoInput(e.target.value.replace(/[^\d]/g, ""))}
                maxLength={6}
              />
            </div>
          </div>

          {/* Status */}
          {over ? (
            <div style={{ background: "#2a1a1a", border: "1px solid #5a2a2a", borderRadius: 10, padding: "9px 14px", marginBottom: 10, color: "#e07a7a", fontSize: 13 }}>
              ⚠️ Total em {totalPct}% — {diff}% acima de 100%. Reduza alguma categoria.
            </div>
          ) : totalPct < 100 ? (
            <div style={{ background: "#1a231a", border: "1px solid #2d4a2d", borderRadius: 10, padding: "9px 14px", marginBottom: 10, color: "#7ec87e", fontSize: 13 }}>
              ✓ Sobram {diff}% não alocados — R$ {fmt(ganho * diff / 100)}
            </div>
          ) : (
            <div style={{ background: "#1a1a2a", border: "1px solid #2d2d5a", borderRadius: 10, padding: "9px 14px", marginBottom: 10, color: "#7a9fea", fontSize: 13 }}>
              ✓ 100% distribuído perfeitamente.
            </div>
          )}

          {/* Rows */}
          {CATEGORIES.map(cat => {
            const val     = (ganho * pcts[cat.id]) / 100;
            const isLucro = cat.id === "lucro";
            return (
              <div key={cat.id} className="row-card" style={{
                background: isLucro ? "#1a221a" : "#1c1c1c",
                border: `1px solid ${isLucro ? "#2d4a2d" : "transparent"}`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
                    <div style={{ width: 9, height: 9, borderRadius: "50%", background: cat.color, flexShrink: 0, marginTop: 3 }} />
                    <div>
                      <div style={{ color: "#fff", fontWeight: 600, fontSize: 14 }}>{cat.label}</div>
                      <div style={{ color: "#555", fontSize: 11 }}>{cat.sublabel}</div>
                    </div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0, marginLeft: 12 }}>
                    <div style={{ color: isLucro ? "#7ec87e" : "#fff", fontWeight: 700, fontSize: 16 }}>R$ {fmt(val)}</div>
                    <div style={{ color: "#444", fontSize: 11 }}>{pcts[cat.id]}%</div>
                  </div>
                </div>
                <div style={{ position: "relative", height: 20, display: "flex", alignItems: "center" }}>
                  <div style={{
                    position: "absolute", left: 0, top: "50%", transform: "translateY(-50%)",
                    width: `${Math.min(pcts[cat.id] * 2, 100)}%`, height: 4,
                    background: cat.color, borderRadius: 2, pointerEvents: "none", transition: "width 0.08s",
                  }} />
                  <input
                    type="range" min={0} max={50} value={pcts[cat.id]}
                    onChange={e => handleSlider(cat.id, e.target.value)}
                    style={{ position: "relative", zIndex: 1, width: "100%" }}
                  />
                </div>
              </div>
            );
          })}

          {/* Total */}
          <div style={{ background: "#1c1c1c", borderRadius: 14, padding: "16px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 2 }}>
            <div>
              <div style={{ color: "#fff", fontWeight: 700, fontSize: 15 }}>Total distribuído</div>
              <div style={{ color: "#555", fontSize: 12 }}>{totalPct}% · {CATEGORIES.length} categorias</div>
            </div>
            <div style={{ color: "#fff", fontWeight: 700, fontSize: 26 }}>R$ {fmt(ganho)}</div>
          </div>

          {/* Chips */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 12 }}>
            {CATEGORIES.map(cat => (
              <div key={cat.id} style={{ background: "#1c1c1c", borderRadius: 8, padding: "5px 10px", display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: cat.color }} />
                <span style={{ color: "#555", fontSize: 11 }}>{cat.label.split(" ")[0]}</span>
                <span style={{ color: "#ccc", fontSize: 11, fontWeight: 700 }}>R$ {fmt((ganho * pcts[cat.id]) / 100)}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── APP SHELL ────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("tabela");

      return (
        <div style={{
          minHeight: "100vh", background: "#111",
          display: "flex", flexDirection: "column", alignItems: "center",
          padding: "28px 16px 60px",
        }}>
          {/* Tabs */}
          <div style={{
            display: "flex", background: "#1c1c1c", borderRadius: 14,
            padding: 4, gap: 4, marginBottom: 24,
            width: "100%", maxWidth: 360,
          }}>
            {[
              { id: "tabela", icon: "📊", label: "Distribuição" },
              { id: "calc",   icon: "🔢", label: "Calculadora"  },
            ].map(t => (
              <button
                key={t.id}
                className="tab-btn"
                onClick={() => setTab(t.id)}
                style={{
                  background: tab === t.id ? "#2e2e2e" : "transparent",
                  color: tab === t.id ? "#fff" : "#555",
                }}
              >
                <span>{t.icon}</span>{t.label}
              </button>
            ))}
          </div>

          {tab === "tabela" ? <Tabela /> : <Calculadora />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
